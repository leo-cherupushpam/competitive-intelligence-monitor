name: 📊 Competitive Data Collection

on:
  schedule:
    # Run website monitoring daily at 2am UTC
    - cron: '0 2 * * *'
    # Run RSS parsing every 6 hours
    - cron: '0 */6 * * *'
    # Run news monitoring daily at 12pm UTC
    - cron: '0 12 * * *'
    # Run job board monitoring bi-weekly (Tuesday 10am UTC)
    - cron: '0 10 * * 2'
    # Run Product Hunt daily at 9am UTC
    - cron: '0 9 * * *'

  # Allow manual trigger via GitHub Actions UI
  workflow_dispatch:

jobs:
  data-collection:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          python -m playwright install

      - name: Trigger data collectors
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          NEWSAPI_KEY: ${{ secrets.NEWSAPI_KEY }}
        run: |
          python -c "
          import os
          import sys
          # Add project root to path
          sys.path.insert(0, '/github/workspace')

          # Import and run collectors based on workflow trigger
          from background_jobs import trigger_all_collectors

          print('Starting data collection...')
          trigger_all_collectors()
          print('Data collection completed successfully!')
          "

      - name: Upload collection logs
        if: always()
        uses: actions/upload-artifact@v3
        with:
          name: collection-logs
          path: collection_*.log
          retention-days: 7

  # Optional: Notify on collection failure
  notify-failure:
    runs-on: ubuntu-latest
    needs: data-collection
    if: failure()
    steps:
      - name: Notify collection failure
        run: |
          echo "⚠️ Data collection failed. Check workflow logs for details."
          echo "Repository: ${{ github.repository }}"
          echo "Workflow: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
